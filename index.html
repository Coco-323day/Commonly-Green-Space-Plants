<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>中国主要气候带城市绿地常用植物 | 学术展示</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2d6a4f;
            --light-green: #40916c;
            --accent-moss: #74c69d;
            --soft-bg: #f8f9fa;
            --card-white: #ffffff;
            --text-dark: #1e2a2e;
            --text-gray: #495057;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
            --radius-lg: 1.25rem;
            --radius-md: 0.75rem;
            --transition: all 0.25s ease;
        }

        body {
            /* 楷体优先，兼顾优雅降级 */
            font-family: '楷体', '华文楷书', 'KaiTi', 'Microsoft YaHei', 'STKaiti', serif;
            background-color: var(--soft-bg);
            color: var(--text-dark);
            line-height: 1.5;
        }

        /* 页头 */
        .hero {
            background: linear-gradient(120deg, #1b4d2e 0%, #2d6a4f 100%);
            color: white;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        /* 主容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        /* 气候带卡片网格 2x2 */
        .climate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.8rem;
            margin-bottom: 3rem;
        }

        .climate-card {
            background: var(--card-white);
            border-radius: var(--radius-lg);
            padding: 1.6rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(0px);
        }

        .climate-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-moss);
            background: #ffffff;
        }

        .climate-card.active {
            border-left: 5px solid var(--primary-green);
            background: #fefef7;
            box-shadow: 0 10px 22px rgba(45, 106, 79, 0.12);
        }

        .climate-icon {
            font-size: 2.6rem;
            color: var(--primary-green);
            margin-bottom: 0.75rem;
        }

        .climate-card h3 {
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--primary-green);
            margin-bottom: 0.4rem;
        }

        .climate-card .climate-en {
            font-size: 0.85rem;
            color: var(--text-gray);
            letter-spacing: 0.3px;
            word-break: break-word;
        }

        /* 植物列表区域 */
        .plants-section {
            margin-top: 1rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px solid #e9ecef;
        }

        .section-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .badge-info {
            background: #e9ecef;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            color: #2d6a4f;
            font-weight: normal;
        }

        /* 植物网格 */
        .plant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }

        /* 植物卡片 */
        .plant-card {
            background: var(--card-white);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .plant-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .card-img {
            width: 100%;
            height: 190px;
            background-color: #eef2e6;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .plant-card:hover .card-img img {
            transform: scale(1.02);
        }

        .img-placeholder {
            font-size: 3rem;
            color: #9cad8e;
            background: #eef2e6;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-content {
            padding: 1.2rem 1.2rem 1.3rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .plant-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 0.25rem;
        }

        .scientific-name {
            font-style: italic;
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .btn-detail {
            background: var(--light-green);
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 0;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .btn-detail:hover {
            background: #1b4d2e;
        }

        /* 加载 & 空状态 */
        .loading-state, .empty-state {
            text-align: center;
            padding: 3rem;
            background: #ffffffd9;
            border-radius: var(--radius-md);
            color: var(--text-gray);
        }

        .loading-state i, .empty-state i {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent-moss);
        }

        /* 模态框 (详情浮层) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            width: 90%;
            max-width: 860px;
            max-height: 85vh;
            border-radius: 1.5rem;
            overflow-y: auto;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
            animation: modalFadeIn 0.25s ease-out;
        }

        @keyframes modalFadeIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 1.2rem 1.8rem;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fefef7;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .modal-header h3 {
            font-size: 1.4rem;
            color: var(--primary-green);
        }

        .modal-header .modal-scientific {
            font-style: italic;
            font-size: 0.9rem;
            color: #5c6e5c;
            margin-left: 0.75rem;
            font-weight: normal;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.7rem;
            cursor: pointer;
            color: #8c8f8c;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #c7362b;
        }

        .modal-body {
            padding: 1.8rem;
        }

        .modal-img-area {
            text-align: center;
            margin-bottom: 1.8rem;
            background: #fafaf2;
            border-radius: 1rem;
            padding: 0.5rem;
            display: none;
        }

        .modal-img-area img {
            max-width: 100%;
            max-height: 320px;
            border-radius: 0.75rem;
            object-fit: contain;
        }

        .detail-field {
            margin-bottom: 1.2rem;
            border-left: 4px solid var(--accent-moss);
            padding-left: 1rem;
        }

        .detail-field .field-label {
            font-weight: 700;
            color: var(--primary-green);
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            display: block;
        }

        .detail-field .field-value {
            color: #2b3b2c;
            font-size: 0.95rem;
            line-height: 1.55;
            background: #f9faf7;
            padding: 0.6rem 1rem;
            border-radius: 0.6rem;
            white-space: pre-wrap;
        }

        /* 返回提示 & 辅助 */
        .click-hint {
            text-align: center;
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 1rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: #5e6f5e;
            font-size: 0.8rem;
            border-top: 1px solid #e0e7dd;
            margin-top: 2rem;
        }

        @media (max-width: 640px) {
            .hero h1 {
                font-size: 1.5rem;
            }
            .climate-card h3 {
                font-size: 1.1rem;
            }
            .section-header h2 {
                font-size: 1.3rem;
            }
            .modal-container {
                width: 95%;
            }
            .modal-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.3rem;
            }
        }
    </style>
</head>
<body>

<header class="hero">
    <h1><i class="fas fa-seedling"></i> 中国主要气候带城市绿地常用植物</h1>
    <p>Urban Greening Plants · 气候适应性植物</p>
</header>

<div class="container">
    <!-- 四个气候带卡片区域 (2x2) -->
    <div class="climate-grid" id="climateGrid"></div>

    <!-- 植物展示区域 -->
    <div class="plants-section" id="plantsSection">
        <div class="section-header">
            <h2><i class="fas fa-leaf"></i> <span id="currentClimateName">🌿 请选择气候带</span></h2>
            <span class="badge-info" id="plantCountBadge"></span>
        </div>
        <div id="plantListContainer">
            <div class="empty-state">
                <i class="fas fa-map-marked-alt"></i>
                <p>点击上方任意气候带卡片，查看对应城市绿地常用植物</p>
                <small style="color: #7d8f7d;">数据包含形态特征、生态习性及精美图集</small>
            </div>
        </div>
    </div>
    <footer>
        🌱 植物数据来源：中国城市绿地植物志 · 学术共享 | 图片仅作示意
    </footer>
</div>

<!-- 模态框（详情弹窗） -->
<div id="detailModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <div>
                <h3 id="modalPlantName">植物名称</h3>
                <div class="modal-scientific" id="modalScientificName"></div>
            </div>
            <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div id="modalImageArea" class="modal-img-area">
                <img id="modalDetailImg" alt="植物形态图">
            </div>
            <div id="modalDetailFields"></div>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 气候带配置 (用户可依据实际JSON文件名和图片文件夹修改)
    // --------------------------------------------------------------
    const CLIMATE_ZONES = [
        {
            id: "temperate",
            name: "温带大陆性半湿润季风气候",
            english: "Temperate Continental Semi-humid Monsoon Climate",
            jsonFile: "温带大陆性半湿润季风气候城市绿地常用植物-网页展示.json",          // 温带 JSON 文件名
            imageFolder: "Temperate/",            // 对应温带图片文件夹
            icon: "fa-tree"
        },
        {
            id: "warmtemperate",
            name: "暖温带半湿润半干旱季风气候",
            english: "Warm Temperate Semi-humid & Semi-arid Monsoon Climate",
            jsonFile: "暖温带半湿润半干旱季风气候城市绿地常用植物-网页展示.json.json",       // 暖温带 JSON
            imageFolder: "Warmtemperate/",
            icon: "fa-sun-plant-wilt"
        },
        {
            id: "subtropical",
            name: "亚热带季风气候",
            english: "Subtropical Monsoon Climate",
            jsonFile: "亚热带季风气候城市绿地常用植物-网页展示.json",         // 亚热带 JSON
            imageFolder: "Subtropical/",
            icon: "fa-cloud-sun-rain"
        },
        {
            id: "tropical",
            name: "热带季风气候",
            english: "Tropical Monsoon Climate",
            jsonFile: "热带季风气候城市绿地常用植物-网页展示.json",            // 热带 JSON (可自定义)
            imageFolder: "Tropical/",
            icon: "fa-umbrella-beach"
        }
    ];

    // 存储当前激活的气候带数据与植物列表
    let currentPlants = [];          // 当前植物对象数组
    let currentImageFolder = "";     // 当前图片文件夹路径
    let currentClimateName = "";
    let currentZoneId = "";

    // 字段映射（提升详情可读性）
    const FIELD_DISPLAY_MAP = {
        'Unnamed: 1': '🌿 植物种',
        'Unnamed: 2': '🖼️ 图片路径',
        'Unnamed: 3': '📖 学名',
        'Unnamed: 4': '🏷️ 别名',
        'Unnamed: 5': '🔬 分类系统',
        'Unnamed: 6': '🌍 分布范围',
        'Unnamed: 7': '🍃 形态特征',
        'Unnamed: 8': '💎 特性及价值',
        'Unnamed: 9': '🌱 适宜生境',
        // 额外支持中文字段
        '植物种': '植物种',
        '学名': '学名',
        '别名': '别名',
        '形态特征': '形态特征',
        '特性': '特性',
        '分布': '分布'
    };

    // 需要过滤掉的字段黑名单（删除详情中多余名录列）
    // 根据用户反馈：温带植物详情页最后一栏出现“温带大陆性半湿润季风气候城市绿地常用植物名录”
    // 我们通过关键词或字段名直接过滤
    const EXCLUDED_FIELD_KEYWORDS = ['名录', '植物名录', '常用植物名录', '城市绿地常用植物名录'];
    // 同时可以显式排除某些特定的 Unnamed 高阶索引，以防万一
    const EXCLUDED_KEYS = ['Unnamed: 10', 'Unnamed: 11', 'Unnamed: 12', 'catalog', 'directory'];

    // 初始化DOM
    document.addEventListener("DOMContentLoaded", () => {
        renderClimateCards();
        bindModalEvents();
    });

    // 1. 渲染气候带卡片
    function renderClimateCards() {
        const grid = document.getElementById("climateGrid");
        grid.innerHTML = "";
        CLIMATE_ZONES.forEach(zone => {
            const card = document.createElement("div");
            card.className = "climate-card";
            card.setAttribute("data-zone-id", zone.id);
            card.innerHTML = `
                <div class="climate-icon"><i class="fas ${zone.icon}"></i></div>
                <h3>${zone.name}</h3>
                <div class="climate-en">${zone.english}</div>
            `;
            card.addEventListener("click", () => {
                document.querySelectorAll(".climate-card").forEach(c => c.classList.remove("active"));
                card.classList.add("active");
                loadPlantsByClimate(zone);
            });
            grid.appendChild(card);
        });
    }

    // 2. 根据气候带加载植物 JSON
    async function loadPlantsByClimate(climateZone) {
        const { name, jsonFile, imageFolder, id } = climateZone;
        currentImageFolder = imageFolder;
        currentClimateName = name;
        currentZoneId = id;

        document.getElementById("currentClimateName").innerHTML = `<i class="fas fa-feather-alt"></i> ${name}  · 常用植物`;
        const container = document.getElementById("plantListContainer");
        container.innerHTML = `<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> 加载 ${name} 植物数据中...</div>`;
        document.getElementById("plantCountBadge").innerText = "";

        try {
            const response = await fetch(jsonFile);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: 请确保 ${jsonFile} 文件存在于当前目录`);
            }
            const data = await response.json();
            
            let plantsArray = null;
            if (data && data.Sheet1 && Array.isArray(data.Sheet1)) {
                plantsArray = data.Sheet1;
            } else if (Array.isArray(data)) {
                plantsArray = data;
            } else if (data && typeof data === "object") {
                const possibleArr = Object.values(data).find(val => Array.isArray(val) && val.length > 0);
                if (possibleArr) plantsArray = possibleArr;
                else throw new Error("JSON数据结构无法识别，请确保包含植物数组或 Sheet1 字段");
            }

            if (!plantsArray || plantsArray.length === 0) {
                throw new Error("未找到植物记录");
            }

            // 过滤掉表头行
            const filteredPlants = plantsArray.filter(item => {
                const nameVal = item['Unnamed: 1'] || item['植物种'] || item['species'];
                if (!nameVal) return false;
                if (nameVal === '植物种' || nameVal === 'Plant' || nameVal === '种名') return false;
                return true;
            });

            if (filteredPlants.length === 0) throw new Error("有效植物条目为空");

            currentPlants = filteredPlants;
            renderPlantList(currentPlants);
            document.getElementById("plantCountBadge").innerText = `${currentPlants.length} 种植物`;
        } catch (err) {
            console.error(err);
            document.getElementById("plantListContainer").innerHTML = `
                <div class="empty-state" style="background:#fff4e6;">
                    <i class="fas fa-exclamation-triangle" style="color:#c45c2c;"></i>
                    <p>❌ 数据加载失败: ${err.message}</p>
                    <small>请检查 ${jsonFile} 是否存在，并与html文件放置在同一目录下。<br>确保图片文件夹 ${imageFolder} 存在。</small>
                </div>
            `;
            document.getElementById("plantCountBadge").innerText = "加载错误";
            currentPlants = [];
        }
    }

    // 3. 渲染植物卡片列表
    function renderPlantList(plants) {
        const container = document.getElementById("plantListContainer");
        if (!plants.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-seedling"></i><p>暂无植物数据</p></div>`;
            return;
        }

        const grid = document.createElement("div");
        grid.className = "plant-grid";
        
        plants.forEach((plant, idx) => {
            const species = plant['Unnamed: 1'] || plant['植物种'] || plant['species'] || "未命名植物";
            const scientific = plant['Unnamed: 3'] || plant['学名'] || plant['scientific_name'] || "";
            const imageFileName = plant['Unnamed: 2'] || plant['图片'] || plant['image'] || null;
            
            let imgUrl = null;
            if (imageFileName && currentImageFolder) {
                const folder = currentImageFolder.endsWith('/') ? currentImageFolder : currentImageFolder + '/';
                imgUrl = folder + imageFileName;
            }

            const card = document.createElement("div");
            card.className = "plant-card";
            
            let imageHtml = '';
            if (imgUrl) {
                imageHtml = `
                    <div class="card-img">
                        <img src="${imgUrl}" alt="${escapeHtml(species)}" loading="lazy" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'img-placeholder\'><i class=\'fas fa-image\'></i><br><span style=\'font-size:12px;\'>无图</span></div>';">
                    </div>
                `;
            } else {
                imageHtml = `<div class="card-img"><div class="img-placeholder"><i class="fas fa-leaf"></i></div></div>`;
            }
            
            card.innerHTML = `
                ${imageHtml}
                <div class="card-content">
                    <div class="plant-name">${escapeHtml(species)}</div>
                    <div class="scientific-name">${escapeHtml(scientific) || "学名待补充"}</div>
                    <button class="btn-detail" data-plant-index="${idx}">
                        <i class="fas fa-info-circle"></i> 查看详情
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });

        container.innerHTML = "";
        container.appendChild(grid);
        
        const btns = container.querySelectorAll('.btn-detail');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = btn.getAttribute('data-plant-index');
                if (idx !== null && currentPlants[parseInt(idx)]) {
                    showPlantDetail(currentPlants[parseInt(idx)]);
                }
            });
        });
    }

    // 判断某个字段是否应该被过滤（移除最后一列那样的名录信息）
    function shouldExcludeField(key, value, label) {
        // 如果key在黑名单中
        if (EXCLUDED_KEYS.includes(key)) return true;
        // 检查label或value是否包含过滤关键词
        const combinedCheck = (label + " " + value).toLowerCase();
        for (let kw of EXCLUDED_FIELD_KEYWORDS) {
            if (combinedCheck.includes(kw.toLowerCase())) {
                return true;
            }
        }
        // 特别处理：如果值的内容类似“温带大陆性半湿润季风气候城市绿地常用植物名录”
        if (typeof value === 'string' && (value.includes('名录') || value.includes('常用植物'))) {
            return true;
        }
        return false;
    }

    // 展示植物详情（模态框内展示所有字段，但过滤掉无用的名录列）
    function showPlantDetail(plant) {
        const modal = document.getElementById("detailModal");
        const modalPlantName = document.getElementById("modalPlantName");
        const modalScientificSpan = document.getElementById("modalScientificName");
        const modalImgArea = document.getElementById("modalImageArea");
        const modalDetailImg = document.getElementById("modalDetailImg");
        const modalFields = document.getElementById("modalDetailFields");
        
        const species = plant['Unnamed: 1'] || plant['植物种'] || plant['species'] || "未命名植物";
        const scientific = plant['Unnamed: 3'] || plant['学名'] || plant['scientific_name'] || "";
        modalPlantName.innerText = species;
        modalScientificSpan.innerText = scientific ? `( ${scientific} )` : "";
        
        // 图片处理
        const imageFileName = plant['Unnamed: 2'] || plant['图片'] || plant['image'] || null;
        if (imageFileName && currentImageFolder) {
            const fullImgPath = (currentImageFolder.endsWith('/') ? currentImageFolder : currentImageFolder + '/') + imageFileName;
            modalDetailImg.src = fullImgPath;
            modalImgArea.style.display = "block";
            modalDetailImg.onerror = () => {
                modalImgArea.style.display = "none";
            };
        } else {
            modalImgArea.style.display = "none";
        }
        
        // 构建字段列表，过滤掉不需要的“名录”列
        const allKeys = Object.keys(plant);
        const orderedKeys = [
            'Unnamed: 4', 'Unnamed: 5', 'Unnamed: 6', 'Unnamed: 7', 'Unnamed: 8', 'Unnamed: 9',
            '别名', '分类系统', '分布', '形态特征', '特性及价值', '适宜生境', '特性', '生态习性'
        ];
        const extraKeys = allKeys.filter(k => !orderedKeys.includes(k) && k !== 'Unnamed: 1' && k !== 'Unnamed: 3' && k !== 'Unnamed: 2' && k !== '植物种' && k !== '学名' && k !== '图片' && k !== 'image');
        const displayKeys = [...orderedKeys, ...extraKeys];
        const processed = new Set();
        const fieldsHtml = [];

        for (let key of displayKeys) {
            if (processed.has(key)) continue;
            let rawValue = plant[key];
            if (rawValue && rawValue !== "" && rawValue !== "/" && rawValue !== "nan") {
                let label = FIELD_DISPLAY_MAP[key] || key.replace(/^Unnamed: \d+/, '').replace(/^_/, '').trim() || key;
                if (label === key && key.includes('Unnamed')) {
                    // 跳过无意义序号键
                    continue;
                }
                // 关键过滤：去掉名录那一列
                if (shouldExcludeField(key, rawValue, label)) {
                    continue;
                }
                let displayValue = rawValue;
                fieldsHtml.push(`
                    <div class="detail-field">
                        <span class="field-label"><i class="fas fa-angle-right"></i> ${escapeHtml(label)}</span>
                        <div class="field-value">${escapeHtml(displayValue)}</div>
                    </div>
                `);
                processed.add(key);
            }
        }
        
        if (fieldsHtml.length === 0) {
            modalFields.innerHTML = `<div class="detail-field"><div class="field-value">暂无详细的植物学数据，仅展示名称。</div></div>`;
        } else {
            modalFields.innerHTML = fieldsHtml.join('');
        }
        
        modal.classList.add("active");
        document.body.style.overflow = "hidden";
    }
    
    function closeModal() {
        const modal = document.getElementById("detailModal");
        modal.classList.remove("active");
        document.body.style.overflow = "";
        setTimeout(() => {
            document.getElementById("modalDetailImg").src = "";
        }, 200);
    }
    
    function bindModalEvents() {
        const modal = document.getElementById("detailModal");
        const closeBtn = document.getElementById("closeModalBtn");
        closeBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && modal.classList.contains("active")) {
                closeModal();
            }
        });
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
